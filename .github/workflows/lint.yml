# Linting CI — runs ruff + mypy + eslint + prettier on every push +
# pull_request. Independent from the Docker image build (build.yml) so
# image publishing isn't blocked by lint failures while the codebase
# tightens. The build.yml flow is the gate that determines what ships;
# this file is the early-warning system.

name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install runtime + dev requirements
        run: |
          pip install -r app/requirements.txt
          pip install -r app/requirements-dev.txt

      - name: pytest
        working-directory: app
        run: pytest tests/ -q

  python:
    name: Python (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dev requirements
        run: pip install -r app/requirements-dev.txt

      - name: ruff check (key families blocking)
        # P27 · post-M06 the baseline is clean for the F/E9/B904/B905/F401
        # families — gate on these. Other families (E402 late imports,
        # E741 single-letter `l` etc.) stay non-blocking for now via
        # the explicit --select list.
        run: ruff check app/ --select F,E9,B904,B905,F401

      - name: ruff format check (warning-only baseline)
        # Codebase was mass-formatted in M04. Still non-blocking for the
        # rare partial-format diff that might slip through pre-commit.
        run: ruff format --check app/ || true

      - name: mypy (permissive baseline)
        # Permissive mode — currently a warning-collector, not a
        # blocker. The `|| true` lets the job pass even with warnings;
        # remove once the codebase's type coverage is dense enough to
        # hold a green baseline.
        run: mypy app/app/ || true

  javascript:
    name: JavaScript (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dev tooling
        run: npm install --no-audit --no-fund

      - name: eslint
        # P27 · errors block, warnings allowed up to the same 50 ratchet
        # pre-commit enforces locally.
        run: npx eslint app/web/static/js --max-warnings 50
        # Prettier check intentionally skipped in this round — the
        # codebase predates prettier and a mass --write would rewrite
        # ~48 files at once. Prettier runs in pre-commit on edited files
        # and gets enabled in CI once the CSS-split prompt normalises
        # the style as part of its partials work.
