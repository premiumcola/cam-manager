# pre-commit configuration. Install with `pre-commit install` after
# `pip install -r app/requirements-dev.txt`.
#
# Hooks run on staged files only — fast feedback. Auto-fixers
# (ruff --fix, prettier --write, eslint --fix) modify files; the user
# re-stages and re-commits. Linters that don't auto-fix block the commit
# so the diff stays clean.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      # Lint Python; auto-fix safe violations.
      - id: ruff
        args: [--fix]
      # Format Python (replaces black).
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
        # CSS/HTML can have meaningful trailing whitespace; restrict to
        # source files where it's universally noise.
        types_or: [python, javascript, yaml, toml, markdown]
      - id: trailing-whitespace
        types_or: [python, javascript, yaml, toml, markdown]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        # CSS/HTML are NOT pre-formatted in this round — the CSS-split
        # follow-up will format the partials in a separate commit. JS
        # handled by eslint --fix above.
        types_or: [javascript, json, markdown]

  - repo: local
    hooks:
      # Custom hook: fail if any tracked source file contains a
      # console.log( call outside test fixtures + the eslint config.
      # CLAUDE.md forbids console.log in production code; this catches
      # accidental leaks before they ship.
      - id: no-console-log
        name: forbid console.log in JS production code
        entry: bash -c 'if git diff --cached --name-only -z | xargs -0 grep -l --include="*.js" -E "console\\.log\\(" 2>/dev/null | grep -v "eslint.config\\|\\.test\\."; then echo "console.log() found — use console.warn/error or showToast instead"; exit 1; fi; exit 0'
        language: system
        pass_filenames: false
        types: [javascript]

      # Local eslint hook (uses the project's installed eslint so the
      # config + plugins resolve from node_modules).
      - id: eslint
        name: eslint
        entry: npx eslint
        language: system
        types: [javascript]
        # Don't fail on warnings — only errors block. The codebase has a
        # baseline of warnings that get fixed gradually.
        args: [--max-warnings, '999']

      # mypy is in permissive mode; it runs to catch obvious None.foo()
      # crashes during refactors but doesn't block on missing types.
      - id: mypy
        name: mypy (permissive)
        entry: bash -c 'command -v mypy >/dev/null && mypy app/app || echo "mypy not installed — pip install -r app/requirements-dev.txt"'
        language: system
        pass_filenames: false
        types: [python]
