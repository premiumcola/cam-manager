<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 720" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mockup of a Telegram chat: a TAM-spy push showing a snapshot of a squirrel with caption '88%' and three inline buttons: Gültig, Falsch, 1 h still.">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e1621"/><stop offset="100%" stop-color="#17212b"/></linearGradient>
    <linearGradient id="phShot" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3a4a5c"/><stop offset="100%" stop-color="#1f2937"/></linearGradient>
  </defs>
  <rect width="480" height="720" fill="url(#bg3)"/>

  <!-- Telegram top bar -->
  <rect x="0" y="0" width="480" height="56" fill="#17212b"/>
  <circle cx="34" cy="28" r="14" fill="url(#phShot)"/>
  <text x="34" y="34" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#7faec9" text-anchor="middle">🐿</text>
  <text x="60" y="26" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#edf4fb">TAM-spy Bot</text>
  <text x="60" y="42" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7faec9">online</text>

  <!-- Bot bubble (incoming) with photo + caption + 3 buttons -->
  <g transform="translate(20,90)">
    <!-- Bubble body -->
    <rect width="380" height="500" rx="14" fill="#182533" stroke="#1f2937" stroke-width="0.5"/>
    <!-- Photo -->
    <rect x="10" y="10" width="360" height="240" rx="10" fill="url(#phShot)"/>
    <!-- Squirrel illustration -->
    <ellipse cx="190" cy="160" rx="70" ry="38" fill="#c87840" opacity="0.9"/>
    <circle cx="246" cy="138" r="22" fill="#c87840"/>
    <path d="M 240 124 L 250 108 L 258 122 Z" fill="#c87840"/>
    <circle cx="252" cy="135" r="3" fill="#0d141d"/>
    <path d="M 220 180 L 222 200" stroke="#c87840" stroke-width="6" stroke-linecap="round"/>
    <!-- Confidence badge top-right of photo -->
    <rect x="304" y="20" width="56" height="22" rx="6" fill="#000" opacity="0.6"/>
    <text x="332" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">🐿 88%</text>
    <!-- Top-left timestamp -->
    <rect x="20" y="20" width="76" height="22" rx="6" fill="#000" opacity="0.6"/>
    <text x="58" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">14:23 · Werkbank</text>
    <!-- Caption -->
    <text x="22" y="278" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#edf4fb">Squirrel · 88% · Werkbank</text>
    <text x="22" y="298" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#7faec9">2.1 s clip · gleich da gewesen</text>

    <!-- Inline keyboard row 1: ✅ ❌ -->
    <g transform="translate(10,320)">
      <rect width="175" height="44" rx="10" fill="#22c55e" opacity="0.18" stroke="#22c55e" stroke-width="0.6"/>
      <text x="87" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#4ade80" text-anchor="middle">✅ Gültig</text>
      <rect x="185" width="175" height="44" rx="10" fill="#ef4444" opacity="0.18" stroke="#ef4444" stroke-width="0.6"/>
      <text x="272" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#fca5a5" text-anchor="middle">❌ Falsch</text>
    </g>
    <!-- Inline keyboard row 2: 🔇 1 h still -->
    <g transform="translate(10,374)">
      <rect width="360" height="44" rx="10" fill="#1f2937" stroke="#2a3a52"/>
      <text x="180" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#94a3b8" text-anchor="middle">🔇 1 h still</text>
    </g>
    <!-- Inline keyboard row 3: dashboard link -->
    <g transform="translate(10,428)">
      <rect width="360" height="44" rx="10" fill="#1f2937" stroke="#2a3a52"/>
      <text x="180" y="28" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#7faec9" text-anchor="middle">🖥 Dashboard öffnen ↗</text>
    </g>
    <!-- Bubble timestamp -->
    <text x="356" y="490" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#7faec9" text-anchor="end">14:23 · gesendet</text>
  </g>

  <!-- Earlier daily-report bubble -->
  <g transform="translate(20,610)">
    <rect width="320" height="78" rx="14" fill="#182533" stroke="#1f2937" stroke-width="0.5"/>
    <text x="14" y="24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#edf4fb">Tagesreport · 26.04.2026</text>
    <text x="14" y="42" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7faec9">Garten: 36 Vögel · 12 Eichhörnchen</text>
    <text x="14" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7faec9">Werkbank: 22 Eichhörnchen · 3 Personen</text>
    <text x="298" y="68" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#566378" text-anchor="end">22:00</text>
  </g>
</svg>
