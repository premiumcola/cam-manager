<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Squirreling Sightings — self-hosted weather-aware camera and AI manager">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d141d"/>
      <stop offset="50%" stop-color="#0f1d28"/>
      <stop offset="100%" stop-color="#142631"/>
    </linearGradient>
    <linearGradient id="forestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b4332"/>
      <stop offset="100%" stop-color="#0d2a1f"/>
    </linearGradient>
    <linearGradient id="trunkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4a26"/>
      <stop offset="100%" stop-color="#5a3a1c"/>
    </linearGradient>
    <linearGradient id="trunkShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a3a1c"/>
      <stop offset="100%" stop-color="#3d2614"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff1c1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff1c1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lensGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6CC4F0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4cc9f0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1280" height="320" fill="url(#skyGrad)"/>

  <g fill="#1c2a3a" opacity="0.4">
    <circle cx="40" cy="40" r="1"/><circle cx="100" cy="40" r="1"/><circle cx="160" cy="40" r="1"/>
    <circle cx="40" cy="100" r="1"/><circle cx="100" cy="100" r="1"/><circle cx="160" cy="100" r="1"/>
    <circle cx="1140" cy="40" r="1"/><circle cx="1200" cy="40" r="1"/><circle cx="1240" cy="40" r="1"/>
    <circle cx="1140" cy="100" r="1"/><circle cx="1200" cy="100" r="1"/><circle cx="1240" cy="100" r="1"/>
  </g>

  <circle cx="1100" cy="78" r="60" fill="url(#moonGlow)"/>
  <circle cx="1100" cy="78" r="22" fill="#2a3a4f" opacity="0.55"/>
  <circle cx="1095" cy="74" r="18" fill="#1d2a3a" opacity="0.7"/>

  <path d="M 0 280 L 1280 280 L 1280 320 L 0 320 Z" fill="url(#forestGrad)"/>

  <g opacity="0.55">
    <ellipse cx="200" cy="220" rx="55" ry="80" fill="#1b4332"/>
    <rect x="196" y="245" width="8" height="60" fill="#0d2a1f"/>
    <ellipse cx="290" cy="235" rx="42" ry="65" fill="#1b4332"/>
    <rect x="287" y="265" width="6" height="40" fill="#0d2a1f"/>
    <ellipse cx="1180" cy="240" rx="44" ry="65" fill="#1b4332"/>
  </g>

  <!-- Hero icon: tree with squirrel peeking out (scaled-up logo-tree-lens-dark) -->
  <!-- Original viewBox 0 0 110 64; we scale ×3.4 and translate to right side -->
  <g transform="translate(870, 60) scale(3.4)" filter="url(#softShadow)">
    <!-- ground/glow under tree -->
    <ellipse cx="35" cy="59" rx="42" ry="3" fill="#1b4332" opacity="0.6"/>

    <!-- trunk -->
    <rect x="30" y="22" width="10" height="36" fill="url(#trunkGrad)"/>
    <rect x="36" y="22" width="4" height="36" fill="url(#trunkShadow)"/>

    <!-- canopy: layered ellipses, large to small -->
    <ellipse cx="35" cy="14" rx="22" ry="12" fill="#2d6a4f"/>
    <ellipse cx="20" cy="18" rx="10" ry="8" fill="#40916c"/>
    <ellipse cx="50" cy="16" rx="11" ry="9" fill="#52b788"/>
    <ellipse cx="35" cy="8" rx="12" ry="6" fill="#74c69d"/>
    <ellipse cx="28" cy="12" rx="8" ry="6" fill="#52b788"/>
    <ellipse cx="42" cy="11" rx="9" ry="6" fill="#40916c"/>
    <ellipse cx="35" cy="22" rx="18" ry="5" fill="#1b4332"/>

    <!-- soft glow halo around squirrel face (lens illumination) -->
    <circle cx="35" cy="14" r="14" fill="url(#lensGlow)"/>

    <!-- squirrel peeking out — head with big eyes (head sits inside the canopy) -->
    <!-- head body -->
    <ellipse cx="35" cy="15" rx="6.5" ry="5.5" fill="#b87333"/>
    <ellipse cx="35" cy="16" rx="5" ry="4" fill="#d4a574"/>
    <!-- ear tufts -->
    <path d="M 30 10 L 31 7 L 32.5 10 Z" fill="#b87333"/>
    <path d="M 37.5 10 L 39 7 L 40 10 Z" fill="#b87333"/>
    <path d="M 30.5 10 L 31 8.5 L 31.8 10 Z" fill="#7a4a26"/>
    <path d="M 38 10 L 39 8.5 L 39.5 10 Z" fill="#7a4a26"/>
    <!-- eyes -->
    <circle cx="32.5" cy="14" r="1.7" fill="#0a0a0a"/>
    <circle cx="37.5" cy="14" r="1.7" fill="#0a0a0a"/>
    <circle cx="32.7" cy="13.6" r="0.55" fill="#fff"/>
    <circle cx="37.7" cy="13.6" r="0.55" fill="#fff"/>
    <!-- nose -->
    <ellipse cx="35" cy="16.2" rx="0.9" ry="0.6" fill="#0a0a0a"/>
    <!-- mouth -->
    <path d="M 33.5 17.6 Q 35 18.5 36.5 17.6" stroke="#0a0a0a" stroke-width="0.4" fill="none" stroke-linecap="round"/>

    <!-- hint of forepaws on a branch -->
    <ellipse cx="32" cy="19.5" rx="1.4" ry="1" fill="#a06c2c"/>
    <ellipse cx="38" cy="19.5" rx="1.4" ry="1" fill="#a06c2c"/>
  </g>

  <g font-family="-apple-system, system-ui, 'Segoe UI', sans-serif">
    <text x="80" y="115" fill="#fff" font-size="56" font-weight="700" letter-spacing="-0.5">Squirreling</text>
    <text x="80" y="170" fill="#74c69d" font-size="56" font-weight="700" letter-spacing="-0.5">· Sightings</text>
    <text x="82" y="208" fill="#94a3b8" font-size="18" font-weight="500" letter-spacing="0.3">Self-hosted, weather-aware IP-camera + AI manager</text>
    <text x="82" y="232" fill="#52b788" font-size="14" font-weight="600" letter-spacing="2.0">CORAL TPU  ·  WEATHER-AWARE  ·  QUEST-DRIVEN</text>
  </g>

  <g transform="translate(82, 252)" font-family="-apple-system, system-ui, 'Segoe UI', sans-serif" font-size="13" font-weight="600">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="118" height="30" rx="15" fill="#1c2a3a" stroke="#2d6a4f" stroke-width="1.4"/>
      <circle cx="18" cy="15" r="5" fill="#52b788"/>
      <text x="32" y="19" fill="#e2e8f0">Reolink RTSP</text>
    </g>
    <g transform="translate(132,0)">
      <rect x="0" y="0" width="106" height="30" rx="15" fill="#1c2a3a" stroke="#ec4899" stroke-width="1.4"/>
      <circle cx="18" cy="15" r="5" fill="#ec4899"/>
      <text x="32" y="19" fill="#e2e8f0">Coral TPU</text>
    </g>
    <g transform="translate(252,0)">
      <rect x="0" y="0" width="118" height="30" rx="15" fill="#1c2a3a" stroke="#4cc9f0" stroke-width="1.4"/>
      <circle cx="18" cy="15" r="5" fill="#4cc9f0"/>
      <text x="32" y="19" fill="#e2e8f0">Open-Meteo</text>
    </g>
    <g transform="translate(384,0)">
      <rect x="0" y="0" width="98" height="30" rx="15" fill="#1c2a3a" stroke="#fbbf24" stroke-width="1.4"/>
      <circle cx="18" cy="15" r="5" fill="#fbbf24"/>
      <text x="32" y="19" fill="#e2e8f0">Telegram</text>
    </g>
    <g transform="translate(496,0)">
      <rect x="0" y="0" width="78" height="30" rx="15" fill="#1c2a3a" stroke="#94a3b8" stroke-width="1.4"/>
      <circle cx="18" cy="15" r="5" fill="#94a3b8"/>
      <text x="32" y="19" fill="#e2e8f0">MQTT</text>
    </g>
  </g>

  <g opacity="0.85">
    <ellipse cx="640" cy="60" rx="6" ry="3" fill="#52b788" transform="rotate(25 640 60)"/>
    <ellipse cx="740" cy="38" rx="5" ry="2.5" fill="#74c69d" transform="rotate(-15 740 38)"/>
    <ellipse cx="800" cy="78" rx="4" ry="2" fill="#40916c" transform="rotate(40 800 78)"/>
    <ellipse cx="600" cy="100" rx="4" ry="2" fill="#74c69d" transform="rotate(60 600 100)"/>
  </g>
</svg>
