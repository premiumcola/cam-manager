<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Live and Motion">
  <defs>
    <linearGradient id="liv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0d2a1f"/>
    </linearGradient>
    <radialGradient id="liv-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6CC4F0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4cc9f0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#liv-bg)" stroke="#2d6a4f" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="22" fill="url(#liv-glow)"/>
  <!-- camera body -->
  <rect x="16" y="22" width="32" height="24" rx="3" fill="#15191E" stroke="#52b788" stroke-width="1.4"/>
  <rect x="46" y="26" width="6" height="16" rx="1" fill="#15191E" stroke="#52b788" stroke-width="1.2"/>
  <!-- viewfinder -->
  <rect x="22" y="18" width="10" height="6" rx="1" fill="#1b4332" stroke="#52b788" stroke-width="1"/>
  <!-- lens -->
  <circle cx="32" cy="34" r="9" fill="#0a0a0a" stroke="#52b788" stroke-width="1.4"/>
  <circle cx="32" cy="34" r="6.5" fill="#3A3F48"/>
  <circle cx="32" cy="34" r="4" fill="#6CC4F0"/>
  <circle cx="33.5" cy="32.5" r="1.2" fill="#fff"/>
  <!-- live dot -->
  <circle cx="50" cy="20" r="3.5" fill="#ef4444"/>
</svg>
