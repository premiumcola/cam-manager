services:
  tam-spy:
    build:
      context: ..
      dockerfile: docker/Dockerfile.coral
    container_name: tam-spy
    restart: unless-stopped
    ports:
      - "8099:8099"
    environment:
      - TZ=Europe/Berlin
      - GARDEN_MONITOR_CONFIG=/app/config/config.yaml
    volumes:
      - ../config:/app/config
      - ../storage:/app/storage
      - ../models:/app/models
    # Google Coral USB TPU device passthrough
    devices:
      - /dev/bus/usb:/dev/bus/usb
    # privileged: true   # nur aktivieren wenn devices-Passthrough nicht reicht (ältere Unraid-Versionen)
