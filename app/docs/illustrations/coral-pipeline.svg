<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Coral pipeline: frame in → motion gate → object detector (Coral or CPU) → bird classifier (if label is bird) → wildlife classifier (if label is mammal) → event store + Telegram. Each stage shows its ms-budget on TPU vs CPU.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="100%" stop-color="#10182a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2333"/>
      <stop offset="100%" stop-color="#141d2c"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a2e"/>
      <stop offset="100%" stop-color="#1c1422"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#102818"/>
      <stop offset="100%" stop-color="#0a1c10"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7faec9"/>
    </marker>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <text x="600" y="36" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" fill="#edf4fb" text-anchor="middle">Coral Classifier-Cascade</text>
  <text x="600" y="56" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#7faec9" text-anchor="middle">Stage 1 läuft auf jedem Frame · Stages 2 + 3 nur wenn das vorige Label passt</text>

  <!-- Stage 1: Frame in -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="20" y="110" width="150" height="100" rx="12" fill="url(#card)" stroke="#2a3a52"/>
    <text x="95" y="138" font-size="11" font-weight="800" fill="#7faec9" text-anchor="middle" letter-spacing="2">FRAME IN</text>
    <text x="95" y="162" font-size="13" font-weight="700" fill="#edf4fb" text-anchor="middle">RTSP grab</text>
    <text x="95" y="180" font-size="10" fill="#566378" text-anchor="middle">substream · 5–10 fps</text>
    <text x="95" y="198" font-size="10" fill="#94a3b8" text-anchor="middle">≈10 ms</text>
  </g>

  <!-- Stage 2: Motion gate -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="190" y="110" width="160" height="100" rx="12" fill="url(#card)" stroke="#2a3a52"/>
    <text x="270" y="138" font-size="11" font-weight="800" fill="#7faec9" text-anchor="middle" letter-spacing="2">MOTION GATE</text>
    <text x="270" y="162" font-size="13" font-weight="700" fill="#edf4fb" text-anchor="middle">OpenCV diff</text>
    <text x="270" y="180" font-size="10" fill="#566378" text-anchor="middle">zone-aware</text>
    <text x="270" y="198" font-size="10" fill="#94a3b8" text-anchor="middle">≈3 ms</text>
  </g>

  <!-- Stage 3: Object detector (highlighted) -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="370" y="110" width="200" height="100" rx="12" fill="url(#hot)" stroke="#5e2942" stroke-width="2"/>
    <text x="470" y="138" font-size="11" font-weight="800" fill="#f472b6" text-anchor="middle" letter-spacing="2">OBJECT DETECTOR</text>
    <text x="470" y="162" font-size="13" font-weight="700" fill="#edf4fb" text-anchor="middle">SSD MobileNet · COCO</text>
    <text x="470" y="180" font-size="10" fill="#f9a8d4" text-anchor="middle">person · car · bird · cat · …</text>
    <text x="470" y="198" font-size="10" fill="#94a3b8" text-anchor="middle">≈30 ms TPU · ≈300 ms CPU</text>
  </g>

  <!-- Stage 4a: Bird classifier (top-right branch) -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="600" y="50" width="200" height="80" rx="12" fill="url(#card)" stroke="#2a3a52"/>
    <text x="700" y="74" font-size="10" font-weight="800" fill="#7faec9" text-anchor="middle" letter-spacing="2">IF LABEL = BIRD</text>
    <text x="700" y="96" font-size="13" font-weight="700" fill="#edf4fb" text-anchor="middle">Bird-Species (iNat)</text>
    <text x="700" y="113" font-size="10" fill="#566378" text-anchor="middle">≈960 Arten · ≈40 ms TPU</text>
  </g>

  <!-- Stage 4b: Wildlife classifier (bottom-right branch) -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="600" y="190" width="200" height="80" rx="12" fill="url(#card)" stroke="#2a3a52"/>
    <text x="700" y="214" font-size="10" font-weight="800" fill="#7faec9" text-anchor="middle" letter-spacing="2">IF LABEL ∈ MAMMAL</text>
    <text x="700" y="236" font-size="13" font-weight="700" fill="#edf4fb" text-anchor="middle">Wildlife-Classifier</text>
    <text x="700" y="253" font-size="10" fill="#566378" text-anchor="middle">Fuchs · Eichhörnchen · Igel</text>
  </g>

  <!-- Stage 5: Event store + Telegram -->
  <g font-family="ui-sans-serif, system-ui, sans-serif">
    <rect x="830" y="110" width="350" height="100" rx="12" fill="url(#terminal)" stroke="#22c55e" stroke-width="1.5"/>
    <text x="1005" y="138" font-size="11" font-weight="800" fill="#22c55e" text-anchor="middle" letter-spacing="2">EVENT</text>
    <text x="1005" y="162" font-size="13" font-weight="700" fill="#edf4fb" text-anchor="middle">EventStore + Telegram + MQTT</text>
    <text x="1005" y="180" font-size="10" fill="#566378" text-anchor="middle">JSON + Snapshot + 5 s-Clip → Persist + Push</text>
    <text x="1005" y="198" font-size="10" fill="#94a3b8" text-anchor="middle">cooldown gate vor Telegram-Push</text>
  </g>

  <!-- Arrows -->
  <g stroke="#7faec9" stroke-width="2" fill="none">
    <line x1="170" y1="160" x2="190" y2="160" marker-end="url(#arr)"/>
    <line x1="350" y1="160" x2="370" y2="160" marker-end="url(#arr)"/>
    <path d="M 570 145 Q 590 90 600 90" marker-end="url(#arr)"/>
    <path d="M 570 175 Q 590 230 600 230" marker-end="url(#arr)"/>
    <path d="M 800 90 Q 815 90 830 145" marker-end="url(#arr)"/>
    <path d="M 800 230 Q 815 230 830 175" marker-end="url(#arr)"/>
    <line x1="570" y1="160" x2="830" y2="160" stroke-dasharray="3,4"/>
  </g>

  <text x="600" y="295" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#566378" text-anchor="middle">Cooldown (event_cooldown_seconds, default 30 s) verhindert Push-Spam · ImpossibleLabels-Filter dropped Halluzinationen</text>
</svg>
