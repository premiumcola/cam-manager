       currentColor so each callsite picks its own tint via the parent's
       stroke attribute or CSS color. -->

           Wetterdaten & Prognose section so it doesn't repeat the
           cloud-rain icon used by the parent panel header. -->
      <symbol id="icon-trend" viewBox="0 0 24 24">
        <polyline points="3,17 9,11 13,15 21,7" fill="none"
                  stroke="currentColor" stroke-width="2.2"
