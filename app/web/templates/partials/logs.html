      <section id="logs" class="panel section" data-dock-section="settings">
        <div class="section-head">
          <h3>System-Logs</h3>
          <div style="display:flex;gap:8px;align-items:center">
            <select id="logLevelFilter" class="log-level-select">
              <option value="DEBUG">DEBUG</option>
              <option value="INFO" selected>INFO</option>
              <option value="WARNING">WARNING</option>
              <option value="ERROR">ERROR</option>
            </select>
            <select id="logSubsystemFilter" class="log-level-select">
              <option value="">Alle Subsysteme</option>
              <option value="camera_runtime">Kameraübersicht</option>
              <option value="camera_runtime.timelapse">Timelapse</option>
              <option value="storage">Mediathek</option>
              <option value="telegram">Telegram</option>
              <option value="mqtt">MQTT</option>
              <option value="detector">Coral / KI</option>
              <option value="discovery">Discovery</option>
              <option value="server">Server</option>
            </select>
            <button id="logRefreshBtn" class="btn-action action-green" type="button"><svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 8A6 6 0 0 1 2 8a6 6 0 0 1 10.3-4.2"/><polyline points="14,2 14,6 10,6"/></svg> Aktualisieren</button>
            <button id="logClearBtn" class="btn btn-danger" type="button"><svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="2.5,4 13.5,4"/><path d="M5.5 4V2.5h5V4"/><path d="M3.5 4l.7 9.2a1.3 1.3 0 0 0 1.3 1.3h5a1.3 1.3 0 0 0 1.3-1.3L12.5 4"/><line x1="6.5" y1="6.5" x2="6.5" y2="12"/><line x1="9.5" y1="6.5" x2="9.5" y2="12"/></svg>Leeren</button>
          </div>
        </div>
        <div id="logOutput" class="log-output"></div>
      </section>
