      <section class="hero panel">
        <div class="hero-title-wrap">
          <h1 class="hero-title" aria-label="TAM-spy">
            <!-- Header brand logo — randomly Spy Scout OR Acorn Cam,
                 50/50, picked once per page-load by chrome/brand-logo.js.
                 The SVG src + alt are populated by JS once the
                 module loads; the `data-brand-locked` attribute is
                 set after first paint so re-renders don't reroll.
                 The launch-transition logic targets `#heroBrandLogo`
                 — keep the id stable. -->
            <img id="heroBrandLogo" class="hero-brand-glyph"
                 src="/static/img/logos/logo-acorn-cam-dark.svg"
                 alt="TAM-spy" />
            <span class="hero-tam">TAM</span><span class="hero-hyphen" aria-hidden="true">-</span><span class="hero-spy">spy</span>
          </h1>
          <p class="hero-subtitle">Coral TPU · weather-aware · quest-driven</p>
        </div>
        <div id="heroBuildInfo" class="hero-build" aria-label="Build-Info"></div>
        <button id="openWizardBtn" class="btn-action ghost hidden">⚙️ Setup-Wizard</button>
      </section>
