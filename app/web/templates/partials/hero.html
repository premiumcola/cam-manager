      <section class="hero panel">
        <div class="hero-title-wrap">
          <h1 class="hero-title" aria-label="TAM-spy">
            <!-- Single source of truth — the same squirrel-with-camera
                 PNG that powers the iOS PWA icon, sized down to fit
                 the title row. The 192 px asset is plenty for a
                 ~32 px display because it gets rasterised once and
                 cached; serving the 1024 master would just bloat the
                 first-paint payload. The launch-transition logic in
                 chrome/launch-splash.js targets this <img> by id, so
                 keep the id stable. -->
            <img id="heroBrandLogo" class="hero-brand-glyph"
                 src="/static/icons/icon-192.png?v={{ static_v('icons/icon-192.png') }}"
                 alt="TAM-spy logo" width="32" height="32" />
            <span class="hero-tam">TAM</span><span class="hero-hyphen" aria-hidden="true">-</span><span class="hero-spy">spy</span>
          </h1>
          <p class="hero-subtitle">Reolink · Coral TPU · Telegram</p>
        </div>
        <div id="heroBuildInfo" class="hero-build" aria-label="Build-Info"></div>
        <button id="openWizardBtn" class="btn-action ghost hidden">⚙️ Setup-Wizard</button>
      </section>
