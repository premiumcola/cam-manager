services:
  tam-spy:
    build:
      context: ./app
      dockerfile: docker/Dockerfile
      cache_from:
        - tam-spy:latest
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-dev}
        BUILD_DATE: ${BUILD_DATE:-unknown}
        BUILD_COUNT: ${BUILD_COUNT:-0}
    image: tam-spy
    container_name: tam-spy
    restart: unless-stopped
    ports:
      - "8099:8099"
    # P29 · production base — only DATA mounts, no code mounts. The
    # built image holds the canonical app/web. Local development adds
    # the code mounts back via docker-compose.override.yml which
    # docker-compose merges automatically when present.
    #
    # Storage carries user data (event JSONs, mp4s, settings.json);
    # models holds the .tflite files that ship out-of-band; app/config
    # is the bundled config.yaml that's read-only at runtime but lives
    # outside the image so an operator can edit it without rebuilding.
    volumes:
      - ./app/config:/app/config
      - ./storage:/app/storage
      - ./models:/app/models
    # Pass every USB device through so the Coral Edge TPU is visible inside
    # the container. Harmless when no Coral stick is plugged in.
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - TZ=Europe/Berlin
      # Force RTSP-over-TCP for every cv2.VideoCapture handle in the
      # process. Without this, FFmpeg defaults to UDP, drops packets,
      # and decodes the gap into the bottom-strip / macroblock smear
      # corruption that the new bottom_strip_anomaly validator was
      # built around. The 5 s `stimeout` matches CAP_PROP_READ_TIMEOUT_MSEC
      # in camera_runtime/_capture.py so the boot-time setting agrees
      # with the per-handle runtime override. Format follows OpenCV's
      # FFmpeg-options grammar (key;value pairs joined by `|`).
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp|stimeout;5000000

  # Coral TPU variant — uncomment and use instead of above if you have a Coral USB TPU
  # tam-spy-coral:
  #   build:
  #     context: ./app
  #     dockerfile: docker/Dockerfile.coral
  #     cache_from:
